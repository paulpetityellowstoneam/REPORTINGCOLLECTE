<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporting Collecte - Everstone REM</title>
    <style>
        :root {
            --primary: #1a2a3a;
            --primary-light: #2c4a6a;
            --accent: #c8a45c;
            --accent-light: #e8d49c;
            --success: #2eaa6f;
            --warning: #e8a838;
            --danger: #d45454;
            --bg: #f4f5f7;
            --card-bg: #ffffff;
            --text: #2c3e50;
            --text-light: #7f8c8d;
            --border: #e0e4e8;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 28px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .header-sub {
            font-size: 13px;
            opacity: 0.7;
            margin-top: 4px;
        }

        .header-right {
            text-align: right;
            font-size: 13px;
        }

        .refresh-btn {
            background: var(--accent);
            color: var(--primary);
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s;
            margin-bottom: 6px;
        }

        .refresh-btn:hover { background: var(--accent-light); }

        .last-update {
            opacity: 0.7;
            font-size: 12px;
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 40px;
        }

        /* KPI Summary */
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }

        .kpi-card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 20px 24px;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--accent);
        }

        .kpi-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-light);
            margin-bottom: 6px;
        }

        .kpi-value {
            font-size: 26px;
            font-weight: 700;
            color: var(--primary);
        }

        .kpi-detail {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 4px;
        }

        /* Section title */
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--accent);
            display: inline-block;
        }

        /* Filter bar */
        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-btn {
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text);
        }

        .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .filter-btn:hover:not(.active) {
            border-color: var(--primary);
        }

        /* Vehicle cards */
        .vehicles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 36px;
        }

        .vehicle-card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 24px;
            box-shadow: var(--shadow);
            transition: transform 0.15s;
        }

        .vehicle-card:hover { transform: translateY(-2px); }

        .vehicle-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .vehicle-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--primary);
        }

        .vehicle-status {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .status-ouvert { background: #e3f2e8; color: #1a8a4a; }
        .status-ferme { background: #e8ecef; color: #5a6a7a; }
        .status-dedie-ouvert { background: #e0f0f5; color: #1a7a8a; }
        .status-dedie-ferme { background: #f0eae0; color: #8a7a5a; }

        .vehicle-amounts {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }

        .amount-block {
            background: var(--bg);
            border-radius: 8px;
            padding: 10px 14px;
        }

        .amount-label {
            font-size: 11px;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .amount-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
        }

        .amount-value.small {
            font-size: 15px;
        }

        /* Progress bar */
        .progress-container {
            margin-top: 4px;
        }

        .progress-labels {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .progress-bar-bg {
            background: #d0d5dc;
            border-radius: 8px;
            height: 18px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.15);
        }

        .progress-bar-fill-signed {
            height: 100%;
            border-radius: 8px;
            background: linear-gradient(90deg, #1a9a5a, #2ecc71);
            position: absolute;
            left: 0;
            top: 0;
            transition: width 0.6s ease;
            box-shadow: 0 1px 4px rgba(46,170,111,0.4);
        }

        .progress-bar-fill-ak {
            height: 100%;
            border-radius: 8px;
            background: linear-gradient(90deg, #d49520, #f0b840);
            position: absolute;
            left: 0;
            top: 0;
            transition: width 0.6s ease;
        }

        .progress-legend {
            display: flex;
            gap: 16px;
            margin-top: 6px;
            font-size: 11px;
            color: var(--text-light);
        }

        .legend-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 4px;
            vertical-align: middle;
        }

        /* AK breakdown */
        .ak-breakdown {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
        }

        .ak-item {
            text-align: center;
            padding: 6px 4px;
            background: var(--bg);
            border-radius: 6px;
        }

        .ak-label {
            font-size: 10px;
            color: var(--text-light);
            font-weight: 600;
        }

        .ak-value {
            font-size: 12px;
            font-weight: 700;
            color: var(--primary);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-light);
        }

        .spinner {
            display: inline-block;
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Responsive */
        @media (max-width: 900px) {
            .container { padding: 16px; }
            .kpi-row { grid-template-columns: repeat(2, 1fr); }
            .vehicles-grid { grid-template-columns: 1fr; }
            .header { padding: 20px; }
            .ak-breakdown { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 600px) {
            .kpi-row { grid-template-columns: 1fr; }
        }

        /* Print */
        @media print {
            .header { background: var(--primary) !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .refresh-btn { display: none; }
            .filter-bar { display: none; }
            body { background: white; }
        }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1>EVERSTONE REM - Reporting Collecte</h1>
        <div class="header-sub">Suivi des souscriptions par vehicule</div>
    </div>
    <div class="header-right">
        <button class="refresh-btn" onclick="loadData()">Actualiser les donnees</button>
        <div class="last-update" id="lastUpdate">-</div>
    </div>
</div>

<div class="container">
    <!-- KPI Row -->
    <div class="kpi-row" style="grid-template-columns: repeat(3, 1fr);" id="kpiRow">
        <div class="kpi-card">
            <div class="kpi-label">Total leve (signe et paye)</div>
            <div class="kpi-value" id="kpiTotalLeve">-</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-label">En cours d'AK</div>
            <div class="kpi-value" id="kpiEnCours">-</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-label">Vehicules ouverts</div>
            <div class="kpi-value" id="kpiVehiculesOuverts">-</div>
        </div>
    </div>

    <!-- Vehicle Dashboard -->
    <div class="section-title">Progression par vehicule</div>
    <div class="filter-bar" id="filterBar">
        <select id="produitFilter" onchange="renderVehicles()" style="padding:6px 14px; border:1px solid var(--border); border-radius:20px; font-size:13px; outline:none; background:white; cursor:pointer; min-width:180px;">
            <option value="">Tous les produits</option>
        </select>
        <button class="filter-btn active" data-filter="all">Tous</button>
        <button class="filter-btn" data-filter="ouvert">Ouverts</button>
        <button class="filter-btn" data-filter="ferme">Fermes</button>
        <button class="filter-btn" data-filter="dedie">Dedies</button>
    </div>
    <div class="vehicles-grid" id="vehiclesGrid">
        <div class="loading"><div class="spinner"></div><p style="margin-top:12px">Chargement des donnees...</p></div>
    </div>

</div>

<script>
    // --- Configuration Airtable ---
    const AIRTABLE_TOKEN = 'pat4Lc8YjdtLjr402.8448e0fd40c9f873a34a92bf6a4cb02135a5b526a3bdedb270b51d139d34e8df';
    const BASE_ID = 'appCFmVngBjLJJyMh';
    const VEHICULES_TABLE = 'tblQYfvogeWTtI2ME';
    const SOUSCRIPTIONS_TABLE = 'tblIdZkC5nbB6GHSZ';

    // Noms des champs Airtable (API REST renvoie record.fields avec les noms)
    const VF = {
        nom: 'Nom du v\u00e9hicule',
        statut: 'Statut',
        leveeMax: 'Montant de la lev\u00e9e maximum',
        totalLeve: 'Montant total lev\u00e9',
        totalEnCoursAK: 'Montant total en cours d\'AK',
        cumulSommesAK: 'Cumul sommes AK',
        pctLeveAtteint: '% de la lev\u00e9e atteint',
        pctLeveEtAK: '% de la lev\u00e9e et AK en cours',
        cumulSignes: 'Cumul de Montant total sign\u00e9 (\u00e0 partir de Souscriptions)',
        cumulEnCours: 'Cumul de Montant total en cours (\u00e0 partir de Souscriptions)'
    };

    const SF = {
        numero: 'Souscriptions',
        statut: 'Statut',
        montantTotal: 'Montant total',
        ak1: 'Montant AK 1',
        ak2: 'Montant AK2',
        ak3: 'Montant AK3',
        ak4: 'Montant AK4',
        ak5: 'Montant AK5',
        ak6: 'Montant AK6',
        vehicule: 'V\u00e9hicule',
        montantAnnule: 'Montant annul\u00e9',
        montantCourant: 'Montant courant (auto)',
        sommesAK: 'Sommes AK'
    };

    let allVehicules = [];
    let allSouscriptions = [];
    let currentFilter = 'all';

    // --- Helpers ---
    function formatEuro(val) {
        if (val == null || isNaN(val)) return '-';
        return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(val);
    }

    function formatPct(val) {
        if (val == null || isNaN(val) || val === Infinity || val === -Infinity) return '-';
        return (val * 100).toFixed(1) + ' %';
    }

    // Acces aux champs via record.fields[fieldName]
    function getVal(record, fieldName) {
        const v = record.fields?.[fieldName];
        if (v == null) return null;
        return v;
    }

    function getNum(record, fieldName) {
        const v = getVal(record, fieldName);
        return (v != null && !isNaN(v)) ? Number(v) : 0;
    }

    function getSelect(record, fieldName) {
        const v = getVal(record, fieldName);
        if (!v) return '';
        // L'API REST renvoie le nom du select directement (string) ou un objet {name}
        if (typeof v === 'string') return v;
        if (v.name) return v.name;
        return String(v);
    }

    function getLinked(record, fieldName) {
        // Les champs linked records ne renvoient PAS les noms via l'API REST
        // On stocke un mapping vehiculeId -> nom pour resoudre les liens
        const v = getVal(record, fieldName);
        if (Array.isArray(v) && v.length > 0) {
            // Si c'est un tableau de strings (IDs de records)
            const first = v[0];
            if (typeof first === 'string') {
                return vehiculeIdToName[first] || first;
            }
            return '';
        }
        if (typeof v === 'string') return vehiculeIdToName[v] || v;
        return '';
    }

    // Mapping vehicule record ID -> nom
    let vehiculeIdToName = {};

    // --- Airtable API ---
    async function fetchAllRecords(tableName) {
        let all = [];
        let offset = null;
        do {
            let url = `https://api.airtable.com/v0/${BASE_ID}/${encodeURIComponent(tableName)}?pageSize=100&_cb=${Date.now()}`;
            if (offset) url += `&offset=${encodeURIComponent(offset)}`;
            const res = await fetch(url, {
                headers: { 'Authorization': `Bearer ${AIRTABLE_TOKEN}` },
                cache: 'no-store'
            });
            if (!res.ok) {
                const errText = await res.text();
                throw new Error(`Erreur API (${res.status}): ${errText}`);
            }
            const data = await res.json();
            all = all.concat(data.records || []);
            offset = data.offset || null;
        } while (offset);
        return all;
    }

    // --- Rendering ---
    function getStatusClass(statut) {
        if (!statut) return '';
        const s = statut.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z ]/g, '');
        if (s.includes('dedie ouvert')) return 'status-dedie-ouvert';
        if (s.includes('dedie ferme')) return 'status-dedie-ferme';
        if (s.includes('ouvert')) return 'status-ouvert';
        if (s.includes('ferme')) return 'status-ferme';
        return '';
    }

    function matchesFilter(vehicule) {
        const statut = getSelect(vehicule, VF.statut).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        if (currentFilter === 'all') return true;
        if (currentFilter === 'ouvert') return statut === 'ouvert';
        if (currentFilter === 'ferme') return statut === 'ferme';
        if (currentFilter === 'dedie') return statut.includes('dedie');
        return true;
    }

    // Calcul des montants par statut et par AK a partir des souscriptions
    function computeVehiculeStats(vehiculeNom) {
        const subs = allSouscriptions.filter(s => getLinked(s, SF.vehicule) === vehiculeNom);
        const stats = {
            signe: 0, enCours: 0, prospectQualifie: 0, prospect: 0, refuse: 0, total: 0,
            ak1: 0, ak2: 0, ak3: 0, ak4: 0, ak5: 0, ak6: 0
        };
        subs.forEach(s => {
            const st = getSelect(s, SF.statut).toLowerCase();
            const montant = getNum(s, SF.montantCourant) || getNum(s, SF.montantTotal);
            if (st.includes('sign') && st.includes('pay')) {
                stats.signe += montant;
            } else if (st.includes('cours')) {
                stats.enCours += montant;
            } else if (st.includes('prospect') && st.includes('qualif')) {
                stats.prospectQualifie += montant;
            } else if (st.includes('prospect')) {
                stats.prospect += montant;
            } else if (st.includes('refus') || st.includes('annul')) {
                stats.refuse += montant;
            }
            stats.total += montant;
            stats.ak1 += getNum(s, SF.ak1);
            stats.ak2 += getNum(s, SF.ak2);
            stats.ak3 += getNum(s, SF.ak3);
            stats.ak4 += getNum(s, SF.ak4);
            stats.ak5 += getNum(s, SF.ak5);
            stats.ak6 += getNum(s, SF.ak6);
        });
        return stats;
    }

    // Extrait le nom du produit (famille) a partir du nom du vehicule
    function getProductFamily(vehiculeName) {
        if (!vehiculeName) return '';
        // Ex: "Redstone 11" -> "Redstone", "Yellowstone 2 - SAS Le Domaine du Lac Leman" -> "Yellowstone"
        const match = vehiculeName.match(/^([A-Za-z]+)/);
        return match ? match[1] : vehiculeName;
    }

    function populateProduitFilter() {
        const select = document.getElementById('produitFilter');
        // Ne lister que les familles de vehicules presents dans les souscriptions
        const vehiculesAvecSouscriptions = new Set(
            allSouscriptions.map(s => getLinked(s, SF.vehicule)).filter(v => v)
        );
        const families = [...new Set(
            [...vehiculesAvecSouscriptions]
                .map(nom => getProductFamily(nom))
                .filter(f => f)
        )].sort();
        const current = select.value;
        select.innerHTML = '<option value="">Tous les produits</option>' +
            families.map(f => `<option value="${f}" ${f === current ? 'selected' : ''}>${f}</option>`).join('');
    }

    function renderKPIs() {
        // Ne compter que les vehicules ayant des souscriptions
        const vehiculesAvecSouscriptions = new Set(
            allSouscriptions.map(s => getLinked(s, SF.vehicule)).filter(v => v)
        );
        const vehiculesActifs = allVehicules.filter(v => vehiculesAvecSouscriptions.has(getVal(v, VF.nom)));
        const ouverts = vehiculesActifs.filter(v => {
            const s = getSelect(v, VF.statut).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
            return (s === 'ouvert' || s === 'dedie ouvert');
        });
        let totalSigne = 0, totalEnCours = 0;
        vehiculesActifs.forEach(v => {
            const nom = getVal(v, VF.nom);
            if (!nom) return;
            const st = computeVehiculeStats(nom);
            totalSigne += st.signe;
            totalEnCours += st.enCours;
        });

        document.getElementById('kpiTotalLeve').textContent = formatEuro(totalSigne);
        document.getElementById('kpiEnCours').textContent = formatEuro(totalEnCours);
        document.getElementById('kpiVehiculesOuverts').textContent = ouverts.length;
    }

    function renderVehicles() {
        const grid = document.getElementById('vehiclesGrid');
        const produitFilter = document.getElementById('produitFilter').value;
        // Ne garder que les vehicules qui ont au moins une souscription
        const vehiculesAvecSouscriptions = new Set(
            allSouscriptions.map(s => getLinked(s, SF.vehicule)).filter(v => v)
        );
        const filtered = allVehicules
            .filter(v => {
                const nom = getVal(v, VF.nom);
                if (!nom) return false;
                const statutV = getSelect(v, VF.statut).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
                const estEnAttente = statutV.includes('attente');
                if (!vehiculesAvecSouscriptions.has(nom) && !estEnAttente) return false;
                if (!matchesFilter(v)) return false;
                if (produitFilter && getProductFamily(nom) !== produitFilter) return false;
                return true;
            })
            .sort((a, b) => {
                // 1. Ouverts, puis en attente, puis fermes
                const sa = getSelect(a, VF.statut).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
                const sb = getSelect(b, VF.statut).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
                function statutOrdre(s) {
                    if (s.includes('attente')) return 1;
                    if (s.includes('ouvert')) return 0;
                    if (s.includes('ferme')) return 2;
                    return 1;
                }
                const ordreA = statutOrdre(sa), ordreB = statutOrdre(sb);
                if (ordreA !== ordreB) return ordreA - ordreB;
                // 2. Alphabetique + numerique au sein de chaque groupe
                const na = getVal(a, VF.nom) || '';
                const nb = getVal(b, VF.nom) || '';
                const pa = na.match(/^([A-Za-z]+)\s*(\d+)?(.*)/);
                const pb = nb.match(/^([A-Za-z]+)\s*(\d+)?(.*)/);
                if (pa && pb) {
                    const famA = pa[1].toLowerCase(), famB = pb[1].toLowerCase();
                    if (famA !== famB) return famA.localeCompare(famB, 'fr');
                    const numA = parseInt(pa[2]) || 0, numB = parseInt(pb[2]) || 0;
                    if (numA !== numB) return numA - numB;
                    return (pa[3] || '').localeCompare(pb[3] || '', 'fr');
                }
                return na.localeCompare(nb, 'fr');
            });

        if (filtered.length === 0) {
            grid.innerHTML = '<p style="color:var(--text-light); padding: 20px;">Aucun vehicule pour ce filtre.</p>';
            return;
        }

        // Vehicules a capital fixe avec AK successives
        const CAPITAL_FIXE = ['Yellowstone 1', 'Redstone 11', 'Redstone 13'];

        grid.innerHTML = filtered.map(v => {
            const nom = getVal(v, VF.nom) || '-';
            const statut = getSelect(v, VF.statut) || '-';
            const leveeMax = getNum(v, VF.leveeMax);
            const isCapitalFixe = CAPITAL_FIXE.includes(nom);

            // Montants calcules a partir des souscriptions
            const st = computeVehiculeStats(nom);

            // Pour capital variable, "en cours" n'existe pas - tout est signe
            const montantSigne = isCapitalFixe ? st.signe : (st.signe + st.enCours);
            const montantEnCours = isCapitalFixe ? st.enCours : 0;

            const totalProspects = st.prospectQualifie + st.prospect;
            const resteACollecter = leveeMax > 0 ? Math.max(0, leveeMax - montantSigne - montantEnCours) : null;
            const resteAIdentifier = leveeMax > 0 ? Math.max(0, leveeMax - montantSigne - montantEnCours - totalProspects) : null;
            const pctSigne = leveeMax > 0 ? (montantSigne / leveeMax) : 0;
            const pctEnCours = leveeMax > 0 ? ((montantSigne + montantEnCours) / leveeMax) : 0;
            const pctTotal = leveeMax > 0 ? ((montantSigne + montantEnCours + totalProspects) / leveeMax) : 0;

            return `
                <div class="vehicle-card">
                    <div class="vehicle-header">
                        <div class="vehicle-name">${nom}</div>
                        <div class="vehicle-status ${getStatusClass(statut)}">${statut}</div>
                    </div>
                    <div class="vehicle-amounts">
                        <div class="amount-block" style="border-left: 3px solid var(--accent);">
                            <div class="amount-label">Objectif levee</div>
                            <div class="amount-value small">${leveeMax > 0 ? formatEuro(leveeMax) : '-'}</div>
                        </div>
                        <div class="amount-block" style="border-left: 3px solid var(--success);">
                            <div class="amount-label">Signe et paye</div>
                            <div class="amount-value small">${formatEuro(montantSigne)}</div>
                        </div>
                        ${isCapitalFixe ? `
                        <div class="amount-block" style="border-left: 3px solid var(--warning);">
                            <div class="amount-label">AK en cours</div>
                            <div class="amount-value small">${formatEuro(montantEnCours)}</div>
                        </div>
                        ` : ''}
                        <div class="amount-block" style="border-left: 3px solid #2196F3;">
                            <div class="amount-label">Prospect qualifie</div>
                            <div class="amount-value small">${formatEuro(st.prospectQualifie)}</div>
                        </div>
                        <div class="amount-block" style="border-left: 3px solid #5b9bd5;">
                            <div class="amount-label">Prospect</div>
                            <div class="amount-value small">${formatEuro(st.prospect)}</div>
                        </div>
                        ${resteACollecter !== null ? `
                        <div class="amount-block" style="border-left: 3px solid var(--danger);">
                            <div class="amount-label">Reste a collecter</div>
                            <div class="amount-value small" style="color:${resteACollecter > 0 ? 'var(--danger)' : 'var(--success)'}">${resteACollecter > 0 ? formatEuro(resteACollecter) : 'Objectif atteint'}</div>
                        </div>
                        ` : ''}
                    </div>
                    ${leveeMax > 0 ? `
                    <div class="progress-container">
                        <div class="progress-labels" style="font-weight:600;">
                            <span>Progression ${formatPct(pctTotal)}</span>
                            <span style="color:var(--danger);">Reste a identifier : ${resteAIdentifier > 0 ? formatEuro(resteAIdentifier) : 'Objectif couvert'}</span>
                        </div>
                        <div class="progress-bar-bg" style="position:relative;">
                            <div style="height:100%; border-radius:8px; background:linear-gradient(90deg, #3a7bd5, #6db3f2); position:absolute; left:0; top:0; width:${Math.min(pctTotal * 100, 100)}%; transition:width 0.6s ease; opacity:0.7;"></div>
                            ${isCapitalFixe ? `<div class="progress-bar-fill-ak" style="width: ${Math.min(pctEnCours * 100, 100)}%"></div>` : ''}
                            <div class="progress-bar-fill-signed" style="width: ${Math.min(pctSigne * 100, 100)}%"></div>
                        </div>
                        <div class="progress-legend">
                            <span><span class="legend-dot" style="background:var(--success)"></span>Signe et paye ${formatPct(pctSigne)}</span>
                            ${isCapitalFixe ? `<span><span class="legend-dot" style="background:var(--warning)"></span>AK en cours ${formatPct(leveeMax > 0 ? montantEnCours / leveeMax : 0)}</span>` : ''}
                            <span><span class="legend-dot" style="background:#2196F3"></span>Prospect qualifie ${formatPct(leveeMax > 0 ? st.prospectQualifie / leveeMax : 0)}</span>
                            <span><span class="legend-dot" style="background:#5b9bd5"></span>Prospect ${formatPct(leveeMax > 0 ? st.prospect / leveeMax : 0)}</span>
                            <span><span class="legend-dot" style="background:#d0d5dc"></span>Reste a identifier ${formatPct(leveeMax > 0 ? Math.max(0, 1 - pctTotal) : 0)}</span>
                        </div>
                    </div>
                    ` : '<div style="font-size:12px;color:var(--text-light);margin-top:8px;">Objectif de levee non defini</div>'}
                    ${isCapitalFixe && !statut.toLowerCase().includes('ferm') ? `
                    <div class="ak-breakdown">
                        <div class="ak-item"><div class="ak-label">AK1</div><div class="ak-value">${st.ak1 > 0 ? formatEuro(st.ak1) : '-'}</div></div>
                        <div class="ak-item"><div class="ak-label">AK2</div><div class="ak-value">${st.ak2 > 0 ? formatEuro(st.ak2) : '-'}</div></div>
                        <div class="ak-item"><div class="ak-label">AK3</div><div class="ak-value">${st.ak3 > 0 ? formatEuro(st.ak3) : '-'}</div></div>
                        <div class="ak-item"><div class="ak-label">AK4</div><div class="ak-value">${st.ak4 > 0 ? formatEuro(st.ak4) : '-'}</div></div>
                        <div class="ak-item"><div class="ak-label">AK5</div><div class="ak-value">${st.ak5 > 0 ? formatEuro(st.ak5) : '-'}</div></div>
                        <div class="ak-item"><div class="ak-label">AK6</div><div class="ak-value">${st.ak6 > 0 ? formatEuro(st.ak6) : '-'}</div></div>
                    </div>
                    ` : ''}
                </div>
            `;
        }).join('');
    }

    // --- Filter buttons ---
    document.getElementById('filterBar').addEventListener('click', e => {
        if (e.target.classList.contains('filter-btn')) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            currentFilter = e.target.dataset.filter;
            renderVehicles();
        }
    });

    // --- Main load ---
    async function loadData() {
        try {
            document.getElementById('vehiclesGrid').innerHTML = '<div class="loading"><div class="spinner"></div><p style="margin-top:12px">Chargement des donnees...</p></div>';

            // 1. Charger les vehicules d'abord pour construire le mapping ID -> Nom
            const vehicules = await fetchAllRecords('V\u00e9hicules');
            allVehicules = vehicules;

            // Construire le mapping recordId -> nom du vehicule
            vehiculeIdToName = {};
            vehicules.forEach(v => {
                const nom = v.fields?.[VF.nom];
                if (nom) vehiculeIdToName[v.id] = nom;
            });

            // 2. Charger les souscriptions
            const souscriptions = await fetchAllRecords('Souscriptions');
            allSouscriptions = souscriptions;

            // Debug : log un record pour verifier la structure
            if (vehicules.length > 0) console.log('Exemple vehicule:', JSON.stringify(vehicules[0], null, 2));
            if (souscriptions.length > 0) console.log('Exemple souscription:', JSON.stringify(souscriptions[0], null, 2));

            renderKPIs();
            populateProduitFilter();
            renderVehicles();
            const now = new Date();
            document.getElementById('lastUpdate').textContent =
                `Derniere mise a jour : ${now.toLocaleDateString('fr-FR')} a ${now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'})}`;

        } catch (err) {
            console.error('Erreur de chargement:', err);
            document.getElementById('vehiclesGrid').innerHTML =
                `<div class="loading" style="color:var(--danger)">
                    <p>Erreur de chargement des donnees</p>
                    <p style="font-size:12px;margin-top:8px">${err.message}</p>
                    <button class="refresh-btn" style="margin-top:12px" onclick="loadData()">Reessayer</button>
                </div>`;
        }
    }

    // Auto-load
    loadData();
</script>

</body>
</html>
